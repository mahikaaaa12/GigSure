{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GigSure — Login & Signup</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'login.css' %}">
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="grid-overlay"></div>

<!-- Dashboard (shown after login/signup) -->
<div class="dashboard" id="dashboard">
  <div class="dash-card">
    <div class="dash-avatar" id="dash-avatar">?</div>
    <div class="dash-name" id="dash-name">—</div>
    <div class="dash-email" id="dash-email">—</div>
    <div id="dash-role-badge" class="dash-role-badge"></div>
    <div class="dash-company" id="dash-company" style="display:none"></div>
    <div class="dash-divider"></div>
    <div class="dash-meta">
      <span id="dash-joined">Joined: —</span>
      <span id="dash-last-login">Last login: —</span>
    </div>
    <button class="btn-logout" onclick="logout()">Sign out</button>
  </div>
</div>

<!-- Auth Card -->
<div class="card-wrap">
  <div class="card">
    <div class="card-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2zm-1 13.5l-3.5-3.5 1.41-1.41L11 12.67l5.09-5.09L17.5 9 11 15.5z"/></svg>
        </div>
        <span class="logo-name">GigSure</span>
      </div>
      <div class="header-title" id="header-title">Welcome back</div>
      <div class="header-sub" id="header-sub">Sign in to your account to continue</div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('signup')">Create Account</button>
    </div>

    <div class="card-body">
      <div class="role-label">I am a</div>
      <div class="role-grid">
        <label class="role-card selected" id="role-insurer" onclick="selectRole('insurer')">
          <input type="radio" name="role" value="insurer" checked>
          <div class="role-check"><svg viewBox="0 0 24 24"><path d="M9 16.2l-3.5-3.5L4.1 14l4.9 4.9 10-10-1.4-1.4L9 16.2z"/></svg></div>
          <div class="role-icon"><svg viewBox="0 0 24 24"><path d="M20 6h-2.18c.07-.44.18-.87.18-1.33C18 2.09 15.91 0 13.33 0c-1.41 0-2.67.58-3.58 1.5L8 3.25 6.25 1.5C5.34.58 4.08 0 2.67 0 1.19 0 0 1.19 0 2.67c0 .46.11.89.18 1.33H0v2h20v-2zM13.33 2c.74 0 1.33.6 1.33 1.33 0 .46-.16.86-.4 1.17H11.4A1.73 1.73 0 0111 3.33C11 2.6 11.6 2 12.33 2h1zm-10.66 0H4c.74 0 1.33.6 1.33 1.33 0 .46-.16.86-.4 1.17H2.6A1.73 1.73 0 012.2 3.33C2.2 2.6 2.8 2 3.53 2h-.86zM0 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8H0v10zm8-7h8v2H8v-2zm0 4h8v2H8v-2zm-4-4h2v6H4v-6z"/></svg></div>
          <div class="role-name">Insurer</div>
          <div class="role-desc">Provide & manage policies</div>
          <span class="role-badge badge-insurer">Provider</span>
        </label>
        <label class="role-card" id="role-beneficiary" onclick="selectRole('beneficiary')">
          <input type="radio" name="role" value="beneficiary">
          <div class="role-check"><svg viewBox="0 0 24 24"><path d="M9 16.2l-3.5-3.5L4.1 14l4.9 4.9 10-10-1.4-1.4L9 16.2z"/></svg></div>
          <div class="role-icon"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4S14.21 4 12 4 8 5.79 8 8s1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
          <div class="role-name">Beneficiary</div>
          <div class="role-desc">Claim & view your coverage</div>
          <span class="role-badge badge-beneficiary">Claimant</span>
        </label>
      </div>

      <!-- LOGIN FORM -->
      <div class="form-section active" id="login-form">
        <div id="login-alert" class="alert"></div>
        <div class="field-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <span class="input-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></span>
            <input type="email" id="login-email" placeholder="you@example.com">
          </div>
          <div class="field-error" id="login-email-err"></div>
        </div>
        <div class="field-group">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon"><svg viewBox="0 0 24 24"><path d="M18 8h-1V6A5 5 0 007 6v2H6a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V10a2 2 0 00-2-2zm-6 9a2 2 0 110-4 2 2 0 010 4zm3.1-9H8.9V6a3.1 3.1 0 016.2 0v2z"/></svg></span>
            <input type="password" id="login-password" placeholder="Enter your password">
          </div>
          <div class="field-error" id="login-password-err"></div>
        </div>
        <div class="forgot-row"><a href="#" class="forgot-link">Forgot password?</a></div>
        <button class="btn-submit" id="login-btn" onclick="handleLogin()">Sign In</button>
        <div class="divider"><span>or continue with</span></div>
        <div class="social-row">
          <button class="btn-social">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button class="btn-social">
            <svg viewBox="0 0 24 24"><path fill="#0A66C2" d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            LinkedIn
          </button>
        </div>
        <div class="switch-text">Don't have an account? <a onclick="switchTab('signup')">Create one →</a></div>
      </div>

      <!-- SIGNUP FORM -->
      <div class="form-section" id="signup-form">
        <div id="signup-alert" class="alert"></div>
        <div class="field-row" id="name-fields">
          <div class="field-group">
            <label>First Name</label>
            <div class="input-wrap">
              <span class="input-icon"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4S14.21 4 12 4 8 5.79 8 8s1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></span>
              <input type="text" id="signup-first" placeholder="John">
            </div>
            <div class="field-error" id="signup-first-err"></div>
          </div>
          <div class="field-group">
            <label>Last Name</label>
            <div class="input-wrap">
              <span class="input-icon"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4S14.21 4 12 4 8 5.79 8 8s1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></span>
              <input type="text" id="signup-last" placeholder="Doe">
            </div>
            <div class="field-error" id="signup-last-err"></div>
          </div>
        </div>
        <div class="field-group" id="company-field" style="display:none">
          <label>Company / Organization</label>
          <div class="input-wrap">
            <span class="input-icon"><svg viewBox="0 0 24 24"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg></span>
            <input type="text" id="signup-company" placeholder="Acme Insurance Co.">
          </div>
          <div class="field-error" id="signup-company-err"></div>
        </div>
        <div class="field-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <span class="input-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></span>
            <input type="email" id="signup-email" placeholder="you@example.com">
          </div>
          <div class="field-error" id="signup-email-err"></div>
        </div>
        <div class="field-group">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon"><svg viewBox="0 0 24 24"><path d="M18 8h-1V6A5 5 0 007 6v2H6a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V10a2 2 0 00-2-2zm-6 9a2 2 0 110-4 2 2 0 010 4zm3.1-9H8.9V6a3.1 3.1 0 016.2 0v2z"/></svg></span>
            <input type="password" id="signup-password" placeholder="Create a strong password" oninput="checkPasswords()">
          </div>
          <div class="field-error" id="signup-password-err"></div>
        </div>
        <div class="field-group">
          <label>Confirm Password</label>
          <div class="input-wrap">
            <span class="input-icon"><svg viewBox="0 0 24 24"><path d="M18 8h-1V6A5 5 0 007 6v2H6a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V10a2 2 0 00-2-2zm-6 9a2 2 0 110-4 2 2 0 010 4zm3.1-9H8.9V6a3.1 3.1 0 016.2 0v2z"/></svg></span>
            <input type="password" id="confirm-password" placeholder="Re-enter your password" oninput="checkPasswords()">
            <span id="pw-match-icon" style="position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:0.85rem;display:none;"></span>
          </div>
          <div id="pw-match-msg" style="font-size:0.75rem;margin-top:5px;display:none;"></div>
        </div>
        <div class="terms-row">
          <input type="checkbox" id="terms">
          <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
        </div>
        <button class="btn-submit" id="signup-btn" onclick="handleSignup()">Create Account</button>
        <div class="switch-text" style="margin-top:16px">Already have an account? <a onclick="switchTab('login')">Sign in →</a></div>
      </div>
    </div>
  </div>
</div>

<script>
  const API = "http://127.0.0.1:8000/api";
  let currentTab = 'login';
  let currentRole = 'insurer';

  // Always clear any existing session when the login page loads
  // so the user must authenticate fresh every time
  window.addEventListener('DOMContentLoaded', () => {
    localStorage.removeItem('gigsure_token');
    localStorage.removeItem('gigsure_user');
  });

  // ── Tab / role ──────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
      b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup'))
    );
    document.getElementById('login-form').classList.toggle('active', tab==='login');
    document.getElementById('signup-form').classList.toggle('active', tab==='signup');
    document.getElementById('header-title').textContent = tab==='login' ? 'Welcome back' : 'Get started today';
    document.getElementById('header-sub').textContent  = tab==='login' ? 'Sign in to your account to continue' : 'Create your GigSure account';
    clearAlerts();
  }

  function selectRole(role) {
    currentRole = role;
    document.getElementById('role-insurer').classList.toggle('selected', role==='insurer');
    document.getElementById('role-beneficiary').classList.toggle('selected', role==='beneficiary');
    if (currentTab==='signup')
      document.getElementById('company-field').style.display = role==='insurer' ? 'block' : 'none';
  }

  // ── Password match ──────────────────────────────────────────
  function checkPasswords() {
    const pw = document.getElementById('signup-password').value;
    const cpw = document.getElementById('confirm-password').value;
    const msg = document.getElementById('pw-match-msg');
    const icon = document.getElementById('pw-match-icon');
    const inp = document.getElementById('confirm-password');
    if (!cpw) { msg.style.display='none'; icon.style.display='none'; inp.style.borderColor=''; return; }
    const ok = pw === cpw;
    msg.textContent = ok ? 'Passwords match' : 'Passwords do not match';
    msg.style.color = ok ? 'var(--green-bright)' : 'var(--error)';
    msg.style.display = 'block';
    icon.textContent = ok ? '✓' : '✗';
    icon.style.color = ok ? 'var(--green-bright)' : 'var(--error)';
    icon.style.display = 'block';
    inp.style.borderColor = ok ? 'var(--green-bright)' : 'var(--error)';
  }

  // ── Utilities ───────────────────────────────────────────────
  function setBtn(id, loading, text) {
    const btn = document.getElementById(id);
    btn.disabled = loading;
    btn.textContent = text;
  }

  function showAlert(id, type, msg) {
    const el = document.getElementById(id);
    el.className = `alert ${type}`;
    el.textContent = msg;
  }

  function clearAlerts() {
    ['login-alert','signup-alert'].forEach(id => {
      const el = document.getElementById(id);
      el.className = 'alert'; el.textContent = '';
    });
    document.querySelectorAll('.field-error').forEach(e => { e.className='field-error'; e.textContent=''; });
    document.querySelectorAll('input').forEach(i => i.classList.remove('error'));
  }

  function showFieldErrors(errors) {
    const map = {
      first_name: 'signup-first', last_name: 'signup-last',
      email: currentTab==='login' ? 'login-email' : 'signup-email',
      password: currentTab==='login' ? 'login-password' : 'signup-password',
      company: 'signup-company', role: null
    };
    Object.entries(errors).forEach(([key, msg]) => {
      const fid = map[key];
      if (fid) {
        const inp = document.getElementById(fid);
        const err = document.getElementById(fid+'-err');
        if (inp) inp.classList.add('error');
        if (err) { err.textContent = msg; err.className = 'field-error visible'; }
      }
    });
  }

  // ── Login ────────────────────────────────────────────────────
  async function handleLogin() {
    clearAlerts();
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    if (!email || !password) {
      showAlert('login-alert', 'error', 'Please fill in all fields.');
      return;
    }

    setBtn('login-btn', true, 'Signing in…');
    try {
      const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, role: currentRole })
      });
      const data = await res.json();

      if (data.success) {
        const authToken = data.token;
        localStorage.setItem('gigsure_token', authToken);
        localStorage.setItem('gigsure_user', JSON.stringify(data.user));
        setBtn('login-btn', false, '✓ Welcome back!');
        setTimeout(() => window.location.href = '/dashboard/', 600);
      } else {
        setBtn('login-btn', false, 'Sign In');
        if (data.errors?.general) showAlert('login-alert', 'error', data.errors.general);
        else if (data.errors?.role) showAlert('login-alert', 'error', data.errors.role);
        else showFieldErrors(data.errors || {});
      }
    } catch (e) {
      setBtn('login-btn', false, 'Sign In');
      showAlert('login-alert', 'error', 'Cannot reach server. Is the backend running?');
    }
  }

  // ── Signup ───────────────────────────────────────────────────
  async function handleSignup() {
    clearAlerts();
    const pw  = document.getElementById('signup-password').value;
    const cpw = document.getElementById('confirm-password').value;

    if (pw !== cpw) {
      showAlert('signup-alert', 'error', 'Passwords do not match.');
      return;
    }
    if (!document.getElementById('terms').checked) {
      showAlert('signup-alert', 'error', 'Please accept the Terms of Service.');
      return;
    }

    const payload = {
      first_name: document.getElementById('signup-first').value.trim(),
      last_name:  document.getElementById('signup-last').value.trim(),
      email:      document.getElementById('signup-email').value.trim(),
      password:   pw,
      role:       currentRole,
      company:    document.getElementById('signup-company').value.trim() || null
    };

    setBtn('signup-btn', true, 'Creating account…');
    try {
      const res = await fetch(`${API}/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (data.success) {
        const authToken = data.token;
        localStorage.setItem('gigsure_token', authToken);
        localStorage.setItem('gigsure_user', JSON.stringify(data.user));
        setBtn('signup-btn', false, '✓ Account created!');
        setTimeout(() => window.location.href = 'index.html', 600);
      } else {
        setBtn('signup-btn', false, 'Create Account');
        showFieldErrors(data.errors || {});
        if (data.errors?.general) showAlert('signup-alert', 'error', data.errors.general);
      }
    } catch (e) {
      setBtn('signup-btn', false, 'Create Account');
      showAlert('signup-alert', 'error', 'Cannot reach server. Is the backend running?');
    }
  }

  // ── Dashboard ────────────────────────────────────────────────
  function showDashboard(user) {
    const initials = (user.first_name[0] + user.last_name[0]).toUpperCase();
    document.getElementById('dash-avatar').textContent = initials;
    document.getElementById('dash-name').textContent = `${user.first_name} ${user.last_name}`;
    document.getElementById('dash-email').textContent = user.email;

    const badge = document.getElementById('dash-role-badge');
    badge.textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
    badge.className = `dash-role-badge ${user.role === 'insurer' ? 'badge-insurer-dash' : 'badge-beneficiary-dash'}`;

    const co = document.getElementById('dash-company');
    if (user.company) { co.textContent = '🏢 ' + user.company; co.style.display = 'block'; }
    else co.style.display = 'none';

    const fmt = d => d ? new Date(d).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) : 'Never';
    document.getElementById('dash-joined').textContent = 'Joined: ' + fmt(user.created_at);
    document.getElementById('dash-last-login').textContent = 'Last login: ' + fmt(user.last_login);

    document.getElementById('dashboard').classList.add('active');
  }

  async function logout() {
    const authToken = localStorage.getItem('gigsure_token');
    try {
      await fetch(`${API}/logout`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
    } catch {}
    localStorage.removeItem('gigsure_token');
    localStorage.removeItem('gigsure_user');
    document.getElementById('dashboard').classList.remove('active');
    setBtn('login-btn', false, 'Sign In');
    setBtn('signup-btn', false, 'Create Account');
  }
</script>
</body>
</html>
